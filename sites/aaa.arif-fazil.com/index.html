<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Δ AAA — Live Cockpit · arifOS</title>
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    .status-bar { background: #000; color: #fff; padding: 8px 24px; font-size: 10px; display: flex; justify-content: space-between; position: fixed; top: 60px; left: 0; right: 0; z-index: 999; }
    .live-indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .live-active { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
    .live-inactive { background: #ef4444; }
    .floor-box { border: 1px solid var(--border); padding: 12px; font-size: 12px; border-radius: 8px; text-align: center; }
    .floor-active { border-color: var(--blue-primary); background: #eff6ff; font-weight: bold; }
    .btn-ignition { background: #ef4444; color: white; border: none; padding: 12px 24px; font-weight: 900; cursor: pointer; border-radius: 4px; }
    .btn-ignition:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <nav class="constellation-nav">
    <div class="logo">
      <a href="/" style="font-weight:900; color:var(--blue-primary); text-decoration:none;">Δ AAA COCKPIT</a>
    </div>
    <div class="nav-links">
      <a href="https://arif-fazil.com">Ψ Identity</a>
      <a href="/" class="active">Δ Governance</a>
      <a href="https://geox.arif-fazil.com">Φ Earth</a>
      <a href="https://waw.arif-fazil.com">Ω Wealth</a>
      <a href="https://mcp.arif-fazil.com">Ω★ Kernel</a>
    </div>
  </nav>

  <div class="status-bar mono">
    <div>
      <span id="conn_indicator" class="live-indicator live-inactive"></span>
      KERNEL: <span id="conn_status">DISCONNECTED</span>
    </div>
    <div>VAULT999: CONNECTED</div>
    <div id="mcp_version">v1.0.0-FORGED</div>
  </div>

  <header class="cockpit-header" style="margin-top: 30px;">
    <div style="max-width:1200px; margin:0 auto; display: flex; justify-content: space-between; align-items: center;">
      <div>
        <span class="badge-blue">Governance Layer</span>
        <h1 style="font-size:48px; font-weight:900; margin:16px 0;">The Cockpit.</h1>
      </div>
      <button class="btn-ignition" onclick="triggerIgnition()">🚀 000_INIT IGNITION</button>
    </div>
  </header>

  <main class="grid-container">
    <!-- FLOORS PANEL -->
    <div class="card" style="grid-column: span 2;">
      <h3 class="mono">02. CONSTITUTIONAL FLOORS</h3>
      <div id="floors_grid" style="display: grid; grid-template-columns: repeat(13, 1fr); gap: 8px; margin-top: 24px;">
        <!-- F1 to F13 generated by JS -->
      </div>
    </div>

    <!-- AGENTS PANEL -->
    <div class="card">
      <h3 class="mono">01. LIVE AGENTS</h3>
      <div id="agent_list" style="margin-top: 16px;">
        <p class="text-muted">Waiting for kernel...</p>
      </div>
    </div>

    <!-- TOOLS PANEL -->
    <div class="card">
      <h3 class="mono">03. TOOL REGISTRY</h3>
      <div id="tool_list" style="margin-top: 16px; font-size: 12px;" class="mono">
        <p class="text-muted">Discovery pending...</p>
      </div>
    </div>
  </main>

  <script src="assets/webmcp.js"></script>
  <script>
    async function initCockpit() {
      try {
        const manifest = await window.mcpClient.connect();
        document.getElementById('conn_indicator').className = 'live-indicator live-active';
        document.getElementById('conn_status').textContent = 'CONNECTED';
        
        // Render Tools
        const toolList = document.getElementById('tool_list');
        toolList.innerHTML = manifest.namespaces.map(ns => `<div>[${ns}] namespace active</div>`).join('');

        // Fetch Floors
        const floors = await window.mcpClient.callTool('floors_inspect');
        renderFloors();

        // Fetch Agents
        const agentsData = await window.mcpClient.callTool('agent_registry_get');
        renderAgents(agentsData.agents);

      } catch (e) {
        document.getElementById('conn_status').textContent = 'CONNECTION ERROR';
      }
    }

    function renderFloors() {
      const grid = document.getElementById('floors_grid');
      grid.innerHTML = Array.from({length: 13}, (_, i) => `
        <div class="floor-box floor-active">F${i+1}</div>
      `).join('');
    }

    function renderAgents(agents) {
      const list = document.getElementById('agent_list');
      list.innerHTML = agents.map(a => `
        <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee;">
          <div class="badge-blue" style="margin-bottom: 4px;">${a.type}</div>
          <div style="font-weight: bold;">${a.id}</div>
          <div style="font-size: 12px; color: #666;">${a.role}</div>
        </div>
      `).join('');
    }

    async function triggerIgnition() {
      if (confirm("WARNING: Triggering 000_INIT will derive new session keys. Continue?")) {
        const result = await window.mcpClient.callTool('init_000', { session_id: 'SES-' + Date.now() });
        alert("IGNITION SUCCESS: " + result.status);
      }
    }

    window.onload = initCockpit;
  </script>
</body>
</html>
