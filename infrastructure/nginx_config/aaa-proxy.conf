# arifOS AAA Site — Nginx Reverse Proxy to Cloudflare Pages
# Add to /etc/nginx/sites-available/ or include in main config

server {
    listen 80;
    server_name aaa.arif-fazil.com;

    # Option 1: Redirect to Cloudflare Pages (best)
    location / {
        return 301 https://ariffazil.pages.dev/aaa$request_uri;
    }
}

