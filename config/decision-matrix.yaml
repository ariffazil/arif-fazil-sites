site_law:
  max_top_level_sites: 5
  canonical_hostnames:
    - arif-fazil.com
    - aaa.arif-fazil.com
    - wiki.arif-fazil.com
    - mcp.arif-fazil.com
    - geox.arif-fazil.com
  retired_aliases:
    arifos.arif-fazil.com: wiki.arif-fazil.com
    arifosmcp.arif-fazil.com: mcp.arif-fazil.com
    forge.arif-fazil.com: aaa.arif-fazil.com
    apex.arif-fazil.com: wiki.arif-fazil.com
    waw.arif-fazil.com: aaa.arif-fazil.com
    wawa.arif-fazil.com: aaa.arif-fazil.com
  hard_rules:
    - "No new public hostname without human seal."
    - "One hostname = one owner repo."
    - "VPS deploy is canonical. External pages platforms are optional mirrors, not primary law."
    - "Retired aliases are redirect-only; do not build new surfaces there."

---
# PERMISSION MATRIX

permissions:
  deploy-planner:
    lanes: [all]
    actions: [read, analyze, recommend]
    prohibited: [deploy, modify]
    
  static-publisher:
    lanes: [static]
    actions: [read, build, deploy, rollback]
    prohibited: [runtime-deploy, edge-deploy]
    
  webmcp-auditor:
    lanes: [static, webmcp]
    actions: [read, audit, validate]
    prohibited: [deploy, modify]
    
  edge-runtime:
    lanes: [edge]
    actions: [read, deploy, rollback]
    prohibited: [runtime-deploy]
    requires: [constitution-check]
    
  mcp-server-operator:
    lanes: [runtime]
    actions: [read, deploy, rollback, config]
    requires: [constitution-check, 888-hold-clear]

---
# ESCALATION TRIGGERS

escalation:
  level_1_skill:
    condition: "skill_returns_hold"
    action: "consult_decision_matrix"
    
  level_2_doctrine:
    condition: "doctrine_ambiguous"
    action: "read_deployment_md"
    
  level_3_constitution:
    condition: "constitutional_question"
    action: "query_arifos_judge"
    endpoint: "https://arifosmcp.arif-fazil.com/judge"
    
  level_4_human:
    condition: "888_hold_active"
    action: "escalate_to_arif"
    authority: "human_sovereign"

---
# HEALTH CHECKS

health_checks:
  static:
    endpoint: "/"
    expected: "HTTP 200"
    check_trinity_nav: true
    
  webmcp:
    endpoint: "/health"
    expected: "HTTP 200"
    check_mcp_bridge: true
    
  edge:
    endpoint: "/"
    expected: "HTTP 200"
    max_latency_ms: 100
    
  runtime:
    endpoint: "/health"
    expected: "HTTP 200"
    check_dependencies: [database, cache]
    check_version_match: true

---
# ROLLBACK CONDITIONS

rollback:
  auto_rollback:
    health_fail_duration: "60s"
    error_rate_threshold: "5%"
    error_rate_window: "5m"
    
  manual_rollback:
    trigger: "user_report_critical"
    authority: "any_agent_with_rollback skill"
    
  constitution_rollback:
    trigger: "888_hold_issued"
    authority: "immediate"
    action: "revert_to_last_known_good"
