# arif-sites — Deployment Decision Matrix
# Deterministic routing logic for deployment lanes
# Governance: arifOS F1-F13

version: "2026.04.23"
seal: "DITEMPA BUKAN DIBERI"

---
# LANE CLASSIFICATION RULES

lanes:
  static:
    name: "Lane 1: Static"
    description: "Pure HTML/CSS/JS, no server-side logic"
    criteria:
      - condition: "no_api_calls"
        value: true
      - condition: "no_server_state"
        value: true
      - condition: "build_output"
        pattern: "dist/ with static files only"
    targets:
      primary: "vps-caddy"
      fallback: "cloudflare-pages"
    deploy_command: "npm ci && npm run build && deploy-site <hostname>"
    risk_level: "low"
    
  webmcp:
    name: "Lane 2: WebMCP"
    description: "Static UI + MCP bridge for tool calls"
    criteria:
      - condition: "uses_mcp"
        value: true
      - condition: "transport"
        value: "sse|websocket"
      - condition: "state_location"
        value: "server-side"
    targets:
      static: "vps-caddy"
      mcp_bridge: "vps-docker"
    deploy_command: "npm run build && deploy-site <hostname>"
    risk_level: "medium"
    
  edge:
    name: "Lane 3: Edge Runtime"
    description: "Lightweight compute at edge, stateless"
    criteria:
      - condition: "compute_required"
        value: true
      - condition: "cpu_time_ms"
        max: 50
      - condition: "memory_mb"
        max: 128
      - condition: "persistent_state"
        value: false
    targets:
      - "cloudflare-workers"
      - "vercel-edge"
      - "deno-deploy"
    deploy_command: "wrangler deploy"
    risk_level: "high"
    
  runtime:
    name: "Lane 4: MCP Runtime"
    description: "Full server with persistent state"
    criteria:
      - condition: "persistent_state"
        value: true
      - condition: "database_required"
        value: true
      - condition: "heavy_compute"
        value: true
      - condition: "mcp_server"
        value: true
    targets:
      - "vps-docker"
      - "fly.io"
      - "railway"
    deploy_command: "docker compose up -d"
    risk_level: "critical"

---
# DECISION TREE

decision_tree:
  start:
    question: "What kind of surface are you deploying?"
    branches:
      - condition: "fully_static"
        next: "lane_static"
      - condition: "uses_webmcp"
        next: "lane_webmcp"
      - condition: "needs_edge_compute"
        next: "lane_edge"
      - condition: "needs_full_runtime"
        next: "lane_runtime"
        
  lane_static:
    action: "deploy_static"
    verify:
      - "build succeeds"
      - "no secrets in dist/"
      - "health check passes"
      
  lane_webmcp:
    action: "deploy_webmcp"
    verify:
      - "mcp endpoint reachable"
      - "cors configured"
      - "auth tokens scoped"
      
  lane_edge:
    action: "deploy_edge"
    verify:
      - "cpu time < 50ms"
      - "no persistent state"
      - "kv bindings correct"
      
  lane_runtime:
    action: "deploy_runtime"
    gates:
      - "arifos_constitution_check"
      - "888_hold_clear"
    verify:
      - "docker build succeeds"
      - "health check passes"
      - "database migrations ready"

