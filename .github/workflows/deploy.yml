name: Deploy Trinity Sites 
 
on: 
  push: 
    branches: 
      - main 
 
jobs: 
  deploy: 
    runs-on: ubuntu-latest 
    strategy: 
      fail-fast: false 
      matrix: 
        include: 
          - name: ariffazil 
            directory: sites/arif-fazil.com 
            build: true 
          - name: arifos 
            directory: sites/arifos 
            build: true 
          - name: aaa 
            directory: sites/aaa 
            build: false 
          - name: apex 
            directory: sites/apex 
            build: true 
 
    steps: 
      - name: Checkout 
        uses: actions/checkout@v4 
 
      - name: Setup Node 
        if: ${{ matrix.build == true }} 
        uses: actions/setup-node@v4 
        with: 
          node-version: 20 
 
      - name: Install Dependencies 
        if: ${{ matrix.build == true }} 
        run: | 
          cd ${{ matrix.directory }} 
          npm install 
 
      - name: Build 
        if: ${{ matrix.build == true }} 
        run: | 
          cd ${{ matrix.directory }} 
          npm run build 
 
      - name: Deploy to Cloudflare Pages 
        uses: cloudflare/wrangler-action@v3 
        with: 
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }} 
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }} 
          command: pages deploy ${{ matrix.build == true && format('{0}/dist', matrix.directory) || matrix.directory }} --project-name=${{ matrix.name }}
